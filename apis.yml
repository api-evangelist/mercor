aid: mercor
name: Mercor
description: Mercor is an AI-powered talent and human-intelligence marketplace that organizes expert humans to power frontier
  AI work. The platform routes specialized professionals (software engineers, finance and investment-banking experts, clinicians,
  attorneys, generalist consultants) to AI labs and enterprises for RLHF data, SFT data, agent training, evals, frontier
  research, and managed data pipelines. Mercor also ships APEX, a public research and benchmarking suite — APEX Benchmarks
  (AI Productivity Index), APEX-Agents Leaderboard, and APEX-SWE Leaderboard. Mercor maintains documentation hubs at mercor.com/docs
  and talent.docs.mercor.com (the expert-facing help center), and exposes a developer-facing documentation surface at mercor.com/docs/api.
  Public API endpoint details are not advertised on the open web at this time; this profile documents the product and documentation
  surfaces rather than endpoint shapes.
